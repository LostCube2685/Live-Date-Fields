<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 12px;
      background: #f4f6fb;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1558b0;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #444;
    }

    .warning {
      margin-top: 10px;
      font-size: 11px;
      color: #b00020;
      line-height: 1.3;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>Date Field Builder</h3>

  <select id="mode">
    <option value="MDY">Month Day Year</option>
    <option value="DMY">Day Month Year</option>
    <option value="YM">Year Month</option>
    <option value="MY">Month Year</option>
    <option value="TIME">TIME (test)</option>
  </select>

  <button onclick="insertField()">Insert Field</button>

  <button onclick="toggle()">
    Toggle Auto Update
  </button>

  <div class="status" id="status"></div>

  <div class="warning">
    ⚠ This tool may modify text by matching previously generated values.
    Any identical text in the document may also be updated.
  </div>
</div>

<script>
function insertField() {
  google.script.run.insertField({
    mode: document.getElementById('mode').value
  });
}

function toggle() {
  google.script.run.withSuccessHandler(function(state) {
    document.getElementById("status").innerText =
      "Auto Update: " + (state ? "ENABLED" : "DISABLED");
  }).toggleAutoUpdate();
}
</script>

</body>
</html>
